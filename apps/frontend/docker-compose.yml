version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: react-app
    ports:
      - "80:80"
    environment:
      - API_CRYPTION_PUBLIC_KEY=${API_CRYPTION_PUBLIC_KEY:-default_key}
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
