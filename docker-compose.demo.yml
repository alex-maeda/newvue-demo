services:
  server:
    image: ${REGISTRY:-registry.gitlab.com/newvue1/newvuevr/newvue-demo}/server:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - PORT=8000
      - CORS_ORIGIN=*

  reporting-ui:
    image: ${REGISTRY:-registry.gitlab.com/newvue1/newvuevr/newvue-demo}/reporting-ui:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "5174:5174"
    environment:
      - API_TARGET=http://server:8000
    depends_on:
      - server

  frontend:
    image: ${REGISTRY:-registry.gitlab.com/newvue1/newvuevr/newvue-demo}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server
      - reporting-ui
